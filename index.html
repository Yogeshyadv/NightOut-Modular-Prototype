<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NightOut — India's Elite Nightlife Platform</title>
    <meta name="description" content="Discover elite venues, skip queues with instant booking, and enjoy a safe night out. India's premier nightlife OS for guests and club owners." />
    <meta name="keywords" content="nightlife india, club booking india, guestlist app, nightclub analytics, qr entry system, safe nightlife, bangalore clubs, mumbai nightlife" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nightout.in/" />
    <meta property="og:title" content="NightOut — India's Elite Nightlife Platform" />
    <meta property="og:description" content="Discover elite venues, skip queues with instant booking, and enjoy a safe night out." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://nightout.in/" />
    <meta property="twitter:title" content="NightOut — India's Elite Nightlife Platform" />
    <meta property="twitter:description" content="Discover elite venues, skip queues with instant booking, and enjoy a safe night out." />
    <meta property="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="/logo.png" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <style>
        #splash-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background-color: #0A0A0A; /* Dark background */
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          font-family: 'Space Grotesk', sans-serif;
          color: white;
        }
        #splash-screen img {
          width: 120px;
          height: 120px;
          animation: pulse 2s infinite ease-in-out;
        }
        #splash-screen h1 {
          margin-top: 20px;
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 2px;
          background: linear-gradient(to right, #00C853, #7C4DFF);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        @keyframes pulse {
          0% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.1); opacity: 0.8; }
          100% { transform: scale(1); opacity: 1; }
        }
      </style>
      <div id="splash-screen">
        <img src="/logo.png" alt="NightOut Logo" />
        <h1>NIGHTOUT</h1>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
