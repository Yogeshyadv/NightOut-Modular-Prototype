<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NightOut — India's Nightlife OS</title>
    <meta name="description" content="Discover venues, book guaranteed entry, and get home safe. NightOut is the complete nightlife platform for India." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <style>
        #splash-screen {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background-color: #0A0A0A; /* Dark background */
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          font-family: 'Space Grotesk', sans-serif;
          color: white;
        }
        #splash-screen img {
          width: 120px;
          height: 120px;
          animation: pulse 2s infinite ease-in-out;
        }
        #splash-screen h1 {
          margin-top: 20px;
          font-size: 24px;
          font-weight: 700;
          letter-spacing: 2px;
          background: linear-gradient(to right, #ff007f, #00f0ff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        @keyframes pulse {
          0% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.1); opacity: 0.8; }
          100% { transform: scale(1); opacity: 1; }
        }
      </style>
      <div id="splash-screen">
        <img src="/logo.png" alt="NightOut Logo" />
        <h1>NIGHTOUT</h1>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
